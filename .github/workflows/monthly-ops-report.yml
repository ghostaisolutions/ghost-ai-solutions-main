name: Monthly Ops Report

on:
  workflow_dispatch:
concurrency:
  group: monthly-ops-report-${{ github.ref }}
  cancel-in-progress: true

jobs:
  send-report:
    name: Build and Email Monthly Ops Report
    runs-on: ubuntu-latest
    environment: Production
    timeout-minutes: 10

    steps:
      - name: Trigger monthly report endpoint
        env:
          SITE_URL: ${{ secrets.NEXT_PUBLIC_BASE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          TARGET_URL="${SITE_URL%/}"
          if [ -z "$TARGET_URL" ]; then
            TARGET_URL="https://www.ghostai.solutions"
          fi
          if [ "$TARGET_URL" = "https://ghostai.solutions" ]; then
            TARGET_URL="https://www.ghostai.solutions"
          fi

          if [ -z "$CRON_SECRET" ]; then
            echo "::error::CRON_SECRET is not configured for this workflow"
            exit 1
          fi
          RESPONSE=$(curl -sSL --retry 3 --retry-delay 2 --retry-all-errors --connect-timeout 15 --max-time 180 -o /tmp/response.json -w "%{http_code}" \
            -X POST \
            -H "Authorization: Bearer $CRON_SECRET" \
            -H "Content-Type: application/json" \
            "$TARGET_URL/api/agents/reports/monthly")

          echo "HTTP status: $RESPONSE"
          cat /tmp/response.json

          if [ "$RESPONSE" -ne 200 ]; then
            echo "Monthly report failed with status $RESPONSE"
            exit 1
          fi

      - name: Notify Slack on failure
        if: failure()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ -z "$SLACK_WEBHOOK_URL" ]; then
            echo "SLACK_WEBHOOK_URL not configured; skipping Slack notification"
            exit 0
          fi
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          PAYLOAD=$(jq -n \
            --arg title "INFO: Monthly Ops Report Failed" \
            --arg workflow "${{ github.workflow }}" \
            --arg branch "${{ github.ref_name }}" \
            --arg run_url "$RUN_URL" \
            --arg ts "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            '{ blocks: [
              {type:"header",text:{type:"plain_text",text:$title,emoji:true}},
              {type:"section",fields:[
                {type:"mrkdwn",text:("*Severity:* Info")},
                {type:"mrkdwn",text:("*Workflow:* " + $workflow)},
                {type:"mrkdwn",text:("*Branch:* `" + $branch + "`")},
                {type:"mrkdwn",text:("*Time:* " + $ts)}
              ]},
              {type:"actions",elements:[{type:"button",text:{type:"plain_text",text:"View Run"},url:$run_url}]}
            ]}')
          curl -sS -X POST -H "Content-type: application/json" --data "$PAYLOAD" "$SLACK_WEBHOOK_URL"
