name: Production Smoke Monitor

on:
  workflow_dispatch:
  schedule:
    - cron: "17 * * * *"

permissions:
  contents: read
  issues: write

concurrency:
  group: production-smoke-monitor-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke-monitor:
    name: Run Production Smoke Checks
    runs-on: ubuntu-latest
    environment: Production
    timeout-minutes: 10

    steps:
      - name: Run health and route checks
        env:
          SITE_URL: ${{ secrets.NEXT_PUBLIC_BASE_URL }}
        run: |
          TARGET_URL="${SITE_URL%/}"
          if [ -z "$TARGET_URL" ]; then
            TARGET_URL="https://www.ghostai.solutions"
          fi
          if [ "$TARGET_URL" = "https://ghostai.solutions" ]; then
            TARGET_URL="https://www.ghostai.solutions"
          fi

          HEALTH_CODE=$(curl -sSL --retry 3 --retry-delay 2 --retry-all-errors --connect-timeout 15 --max-time 60 -o /tmp/health.json -w "%{http_code}" "$TARGET_URL/api/health")
          echo "Health status: $HEALTH_CODE"
          cat /tmp/health.json
          if [ "$HEALTH_CODE" -ne 200 ]; then
            echo "Health endpoint failed with status $HEALTH_CODE"
            exit 1
          fi

          node -e 'const fs=require("fs");const d=JSON.parse(fs.readFileSync("/tmp/health.json","utf8"));if(!d.ok){console.error("Health payload missing ok=true");process.exit(1)}'

          HOME_CODE=$(curl -sSL --retry 2 --retry-delay 2 --retry-all-errors --connect-timeout 15 --max-time 60 -o /dev/null -w "%{http_code}" "$TARGET_URL/")
          echo "Homepage status: $HOME_CODE"
          if [ "$HOME_CODE" -lt 200 ] || [ "$HOME_CODE" -ge 400 ]; then
            echo "Homepage check failed with status $HOME_CODE"
            exit 1
          fi

          ADMIN_CODE=$(curl -sSL --retry 2 --retry-delay 2 --retry-all-errors --connect-timeout 15 --max-time 60 -o /dev/null -w "%{http_code}" "$TARGET_URL/admin/login")
          echo "Admin login status: $ADMIN_CODE"
          if [ "$ADMIN_CODE" -lt 200 ] || [ "$ADMIN_CODE" -ge 400 ]; then
            echo "Admin login check failed with status $ADMIN_CODE"
            exit 1
          fi

      - name: Open or update failure issue
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const title = "Ops Alert: Production Smoke Monitor Failed";
            const runUrl = `https://github.com/${owner}/${repo}/actions/runs/${context.runId}`;
            const body = [
              "Automated production smoke checks failed.",
              "",
              `Run: ${runUrl}`,
              `Time: ${new Date().toISOString()}`,
              "",
              "Please inspect workflow logs and resolve before next cycle."
            ].join("\n");

            const issues = await github.paginate(github.rest.issues.listForRepo, {
              owner,
              repo,
              state: "open",
              per_page: 100,
            });

            const existing = issues.find((i) => i.title === title);
            if (existing) {
              await github.rest.issues.createComment({ owner, repo, issue_number: existing.number, body });
            } else {
              await github.rest.issues.create({ owner, repo, title, body });
            }

      - name: Notify Slack on failure
        if: failure()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ -z "$SLACK_WEBHOOK_URL" ]; then
            echo "SLACK_WEBHOOK_URL not configured; skipping Slack notification"
            exit 0
          fi
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          PAYLOAD=$(jq -n \
            --arg title "CRITICAL: Production Smoke Monitor Failed" \
            --arg workflow "${{ github.workflow }}" \
            --arg branch "${{ github.ref_name }}" \
            --arg run_url "$RUN_URL" \
            --arg ts "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            '{ blocks: [
              {type:"header",text:{type:"plain_text",text:$title,emoji:true}},
              {type:"section",fields:[
                {type:"mrkdwn",text:("*Severity:* Critical")},
                {type:"mrkdwn",text:("*Workflow:* " + $workflow)},
                {type:"mrkdwn",text:("*Branch:* `" + $branch + "`")},
                {type:"mrkdwn",text:("*Time:* " + $ts)}
              ]},
              {type:"actions",elements:[{type:"button",text:{type:"plain_text",text:"View Run"},url:$run_url}]}
            ]}')
          curl -sS -X POST -H "Content-type: application/json" --data "$PAYLOAD" "$SLACK_WEBHOOK_URL"
